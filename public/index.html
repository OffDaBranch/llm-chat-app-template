<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BranchOps Personal AI Core</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
				--panel-bg: #ffffff;
				--success-color: #166534;
				--success-bg: #dcfce7;
				--error-color: #991b1b;
				--error-bg: #fee2e2;
				--info-color: #1d4ed8;
				--info-bg: #dbeafe;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 900px;
				margin: 0 auto;
				padding: 1rem;
				background: #fff;
			}

			header {
				text-align: center;
				margin-bottom: 1rem;
				padding: 1rem 0;
				border-bottom: 1px solid var(--border-color);
			}

			h1 {
				font-size: 1.6rem;
				color: var(--primary-color);
			}

			header p {
				color: var(--text-light);
			}

			.knowledge-panel {
				background: var(--panel-bg);
				border: 1px solid var(--border-color);
				border-radius: 8px;
				padding: 1rem;
				margin-bottom: 1rem;
			}

			.knowledge-panel h2 {
				font-size: 1rem;
				margin-bottom: 0.75rem;
			}

			.upload-controls {
				display: flex;
				flex-wrap: wrap;
				gap: 0.75rem;
				align-items: center;
				margin-bottom: 0.75rem;
			}

			#upload-file-input {
				flex: 1;
				min-width: 220px;
			}

			button {
				border: none;
				border-radius: 4px;
				cursor: pointer;
				transition: background-color 0.2s ease;
			}

			#upload-button,
			#send-button,
			#new-chat-button {
				padding: 0.75rem 1rem;
				background-color: var(--primary-color);
				color: white;
			}

			#upload-button:hover,
			#send-button:hover,
			#new-chat-button:hover {
				background-color: var(--primary-hover);
			}

			#upload-button:disabled,
			#send-button:disabled,
			#new-chat-button:disabled {
				background-color: var(--text-light);
				cursor: not-allowed;
			}

			.upload-status {
				min-height: 24px;
				padding: 0.5rem 0.75rem;
				border-radius: 6px;
				font-size: 0.9rem;
				margin-bottom: 0.75rem;
			}

			.upload-status.hidden {
				display: none;
			}

			.upload-status.info {
				background: var(--info-bg);
				color: var(--info-color);
			}

			.upload-status.success {
				background: var(--success-bg);
				color: var(--success-color);
			}

			.upload-status.error {
				background: var(--error-bg);
				color: var(--error-color);
			}

			.documents-panel {
				border-top: 1px solid var(--border-color);
				padding-top: 0.75rem;
			}

			.documents-panel h3 {
				font-size: 0.95rem;
				margin-bottom: 0.5rem;
			}

			#documents-list {
				list-style: none;
				display: flex;
				flex-direction: column;
				gap: 0.5rem;
			}

			#documents-list li {
				background: var(--light-bg);
				border: 1px solid var(--border-color);
				border-radius: 6px;
				padding: 0.6rem 0.75rem;
			}

			.document-title {
				font-weight: 600;
			}

			.document-meta {
				font-size: 0.85rem;
				color: var(--text-light);
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 330px);
				min-height: 420px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 85%;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
			}

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
				gap: 0.5rem;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				font-family: inherit;
				resize: none;
				min-height: 44px;
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 1rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				margin-top: 1rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
			}
		</style>
	</head>
	<body>
		<header>
			<h1>BranchOps Personal AI Core</h1>
			<p>Chat, knowledge, retrieval, and citations</p>
		</header>

		<section class="knowledge-panel">
			<h2>Knowledge Upload</h2>

			<div class="upload-controls">
				<input
					type="file"
					id="upload-file-input"
					accept=".txt,text/plain"
				/>
				<button id="upload-button" type="button">Upload .txt File</button>
			</div>

			<div id="upload-status" class="upload-status hidden"></div>

			<div class="documents-panel">
				<h3>Uploaded Documents</h3>
				<ul id="documents-list">
					<li>No documents uploaded yet.</li>
				</ul>
			</div>
		</section>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages"></div>

			<div class="typing-indicator" id="typing-indicator">
				AI is thinking...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Type your message here..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button" type="button">Send</button>
			</div>
		</div>

		<footer>
			<p>BranchOps Personal AI Core</p>
		</footer>

		<script src="chat.js"></script>
	</body>
</html>
